AWSTemplateFormatVersion: "2010-09-09"
Description: Application account (Account B)

Resources:

  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: app-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::222222222222:root
            Action: sts:AssumeRole

Outputs:
  AppRoleArn:
    Value: !GetAtt AppRole.Arn
