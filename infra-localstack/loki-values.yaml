# ------------------------------------------------------------------------------
# Loki deployment mode
# ------------------------------------------------------------------------------
deploymentMode: SingleBinary

# ------------------------------------------------------------------------------
# Loki main configuration
# ------------------------------------------------------------------------------
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  limits_config:
    retention_period: 168h   # 7 days, safe for lab
    allow_structured_metadata: false

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  storage_config:
    filesystem:
      directory: /data/loki/chunks

# ------------------------------------------------------------------------------
# SingleBinary (the only enabled workload)
# ------------------------------------------------------------------------------
singleBinary:
  replicas: 1

  persistence:
    enabled: true
    size: 20Gi
    storageClassName: slow-hdd

  extraVolumeMounts:
    - name: storage
      mountPath: /data/loki

# ------------------------------------------------------------------------------
# Explicitly disable SimpleScalable components
# (CRITICAL to avoid validation errors)
# ------------------------------------------------------------------------------
read:
  enabled: false
  replicas: 0

write:
  enabled: false
  replicas: 0

backend:
  enabled: false
  replicas: 0

# ------------------------------------------------------------------------------
# Disable optional components (safe for lab)
# ------------------------------------------------------------------------------
gateway:
  enabled: true

canary:
  enabled: true

chunksCache:
  enabled: false

resultsCache:
  enabled: false

ruler:
  enabled: false
