apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-gateway-app
  namespace: cloudmart
data:
  app.py: |
    import os
    import time
    import json
    import urllib.request
    import urllib.error
    from typing import Any, Dict, List, Optional

    import boto3
    from botocore.config import Config
    from fastapi import FastAPI, Request, Response
    from pydantic import BaseModel

    from prometheus_client import (
      CONTENT_TYPE_LATEST,
      Counter,
      Histogram,
      generate_latest,
    )

    APP_NAME = "agent-gateway"

    AWS_REGION = os.getenv("AWS_REGION", "us-east-1")
    LOCALSTACK_ENDPOINT = os.getenv("LOCALSTACK_ENDPOINT")
    PRODUCTS_TABLE = os.getenv("PRODUCTS_TABLE", "cloudmart_products")

    OLLAMA_BASE_URL = os.getenv("OLLAMA_BASE_URL", "").rstrip("/")
    OLLAMA_MODEL = os.getenv("OLLAMA_MODEL", "gemma3:12b")

    # --- Prometheus metrics ---
    REQ_COUNT = Counter(
      "http_requests_total",
      "Total HTTP requests",
      ["method", "path", "status"],
    )
    REQ_LATENCY = Histogram(
      "http_request_duration_seconds",
      "HTTP request latency in seconds",
      ["method", "path"],
    )

    # boto3 client against LocalStack
    ddb = boto3.client(
      "dynamodb",
      region_name=AWS_REGION,
      endpoint_url=LOCALSTACK_ENDPOINT,
      aws_access_key_id=os.getenv("AWS_ACCESS_KEY_ID", "test"),
      aws_secret_access_key=os.getenv("AWS_SECRET_ACCESS_KEY", "test"),
      config=Config(retries={"max_attempts": 2, "mode": "standard"}),
    )

    app = FastAPI(title=APP_NAME)

    # --- Models ---
    class ChatIn(BaseModel):
      message: str
      session_id: Optional[str] = None

    # OpenAI-compatible (minimal) request schema
    class OAChatMessage(BaseModel):
      role: str
      content: str

    class OAChatIn(BaseModel):
      model: Optional[str] = None
      messages: List[OAChatMessage]
      temperature: Optional[float] = 0.2
      stream: Optional[bool] = False

    # --- Middleware for metrics ---
    @app.middleware("http")
    async def prom_middleware(request: Request, call_next):
      start = time.time()
      status_code = 500
      try:
        resp: Response = await call_next(request)
        status_code = resp.status_code
        return resp
      finally:
        elapsed = time.time() - start
        path = request.url.path
        # avoid high-cardinality paths; here all are static anyway
        REQ_LATENCY.labels(request.method, path).observe(elapsed)
        REQ_COUNT.labels(request.method, path, str(status_code)).inc()

    @app.get("/healthz")
    def healthz():
      # minimal connectivity check
      try:
        ddb.list_tables(Limit=1)
        ddb_ok = True
      except Exception:
        ddb_ok = False

      ollama_ok = False
      if OLLAMA_BASE_URL:
        try:
          # lightweight check: list tags
          with urllib.request.urlopen(f"{OLLAMA_BASE_URL}/api/tags", timeout=3) as r:
            _ = r.read(200)
          ollama_ok = True
        except Exception:
          ollama_ok = False

      return {
        "service": APP_NAME,
        "dynamodb_ok": ddb_ok,
        "ollama_ok": ollama_ok,
        "localstack_endpoint": LOCALSTACK_ENDPOINT,
        "products_table": PRODUCTS_TABLE,
        "ollama_base_url": OLLAMA_BASE_URL,
        "ollama_model": OLLAMA_MODEL,
      }

    @app.get("/metrics")
    def metrics():
      return Response(generate_latest(), media_type=CONTENT_TYPE_LATEST)

    # --- Tools ---
    def list_products(limit: int = 50) -> List[Dict[str, Any]]:
      resp = ddb.scan(TableName=PRODUCTS_TABLE, Limit=limit)
      items = resp.get("Items", [])
      out: List[Dict[str, Any]] = []
      for it in items:
        out.append({
          "pk": it["pk"]["S"],
          "sk": it["sk"]["S"],
          "name": it.get("name", {}).get("S"),
          "price": float(it.get("price", {}).get("N", "0")),
        })
      return out

    def is_list_products_intent(text: str) -> bool:
      t = text.lower()
      return (
        "list products" in t
        or "products" in t
        or "товар" in t
        or "каталог" in t
        or "список товар" in t
      )

    # --- Ollama proxy ---
    def ollama_chat(user_text: str, model: str, temperature: float = 0.2) -> str:
      if not OLLAMA_BASE_URL:
        return "OLLAMA_BASE_URL не налаштований. Додай env var OLLAMA_BASE_URL у Deployment."

      url = f"{OLLAMA_BASE_URL}/api/chat"
      payload = {
        "model": model,
        "messages": [{"role": "user", "content": user_text}],
        "stream": False,
        "options": {"temperature": temperature},
      }

      data = json.dumps(payload).encode("utf-8")
      req = urllib.request.Request(
        url,
        data=data,
        headers={"Content-Type": "application/json"},
        method="POST",
      )

      try:
        with urllib.request.urlopen(req, timeout=60) as r:
          body = r.read()
        j = json.loads(body.decode("utf-8"))
        # Ollama returns: {"message":{"role":"assistant","content":"..."}, ...}
        return j.get("message", {}).get("content", "") or ""
      except urllib.error.HTTPError as e:
        err = e.read().decode("utf-8", errors="ignore")
        return f"Ollama HTTPError {e.code}: {err[:400]}"
      except Exception as e:
        return f"Помилка виклику Ollama: {type(e).__name__}: {str(e)[:300]}"

    # --- Existing simple endpoint (kept) ---
    @app.post("/chat")
    def chat(payload: ChatIn):
      text = payload.message.strip()
      if is_list_products_intent(text):
        products = list_products()
        return {"reply": "Ось список продуктів:", "products": products}
      reply = ollama_chat(text, model=OLLAMA_MODEL)
      return {"reply": reply or "Порожня відповідь від моделі."}

    # --- OpenAI-compatible endpoint ---
    @app.post("/v1/chat/completions")
    def v1_chat_completions(payload: OAChatIn):
      # minimal OpenAI-like response
      model = payload.model or OLLAMA_MODEL

      # pick last user message
      user_text = ""
      for m in reversed(payload.messages):
        if m.role == "user":
          user_text = m.content
          break
      user_text = (user_text or "").strip()

      # tool routing: list products
      if is_list_products_intent(user_text):
        products = list_products()
        content = "Ось список продуктів:\n" + "\n".join(
          [f"- {p.get('name')} (${p.get('price')})" for p in products]
        )
      else:
        content = ollama_chat(user_text, model=model, temperature=payload.temperature or 0.2)
        if not content:
          content = "Порожня відповідь від моделі."

      # response format compatible enough for most clients
      now = int(time.time())
      return {
        "id": f"chatcmpl-{now}",
        "object": "chat.completion",
        "created": now,
        "model": model,
        "choices": [
          {
            "index": 0,
            "message": {"role": "assistant", "content": content},
            "finish_reason": "stop",
          }
        ],
        "usage": {"prompt_tokens": 0, "completion_tokens": 0, "total_tokens": 0},
      }
