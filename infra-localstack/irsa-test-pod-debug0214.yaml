apiVersion: v1
kind: Pod
metadata:
  name: irsa-test-debug
  namespace: default
spec:
  serviceAccountName: irsa-sa
  restartPolicy: Never
  containers:
    - name: awscli
      image: amazon/aws-cli:2.13.38
      command: ["/bin/sh", "-lc"]
      args:
        - |
          set -euo pipefail

          echo "== Token file =="
          ls -l /var/run/secrets/eks.amazonaws.com/serviceaccount
          echo "Token (first 20 chars): $(head -c 20 ${AWS_WEB_IDENTITY_TOKEN_FILE})"
          echo

          echo "== AssumeRoleWithWebIdentity =="
          read AK SK ST <<< "$(aws --endpoint-url=${LOCALSTACK_ENDPOINT} \
            sts assume-role-with-web-identity \
            --role-arn ${AWS_ROLE_ARN} \
            --role-session-name irsa-test \
            --web-identity-token file://${AWS_WEB_IDENTITY_TOKEN_FILE} \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)"

          export AWS_ACCESS_KEY_ID="${AK}"
          export AWS_SECRET_ACCESS_KEY="${SK}"
          export AWS_SESSION_TOKEN="${ST}"

          echo "== Caller identity =="
          aws --endpoint-url=${LOCALSTACK_ENDPOINT} sts get-caller-identity
          echo

          echo "== S3 list (using assumed creds) =="
          aws --endpoint-url=${LOCALSTACK_ENDPOINT} s3 ls
          echo

          echo "Keeping container alive for debug..."
          sleep 600
      env:
        - name: AWS_ROLE_ARN
          value: "arn:aws:iam::000000000000:role/irsa-demo-role"
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
        - name: LOCALSTACK_ENDPOINT
          value: "http://localstack:4566"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: AWS_EC2_METADATA_DISABLED
          value: "true"
      volumeMounts:
        - name: web-identity-token
          mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
          readOnly: true
  volumes:
    - name: web-identity-token
      secret:
        secretName: irsa-web-identity-token
        items:
          - key: token
            path: token
