AWSTemplateFormatVersion: "2010-09-09"
Description: StackSet admin & execution roles

Resources:

  StackSetAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: stackset-admin-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: stackset-admin-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource: "*"
