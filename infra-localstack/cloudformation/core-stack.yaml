AWSTemplateFormatVersion: "2010-09-09"
Description: Core infrastructure for LocalStack (S3 + DynamoDB)

Resources:

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: localstack-artifacts

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: localstack-logs

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
