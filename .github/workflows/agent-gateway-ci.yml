name: agent-gateway-ci

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/agent-gateway/**'

env:
  IMAGE_NAME: ghcr.io/igordems/agent-gateway

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Create tag
      id: meta
      run: |
        echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.GHCR_USERNAME }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build image
      run: |
        docker build \
          -t $IMAGE_NAME:latest \
          -t $IMAGE_NAME:${{ steps.meta.outputs.tag }} \
          -f docker/agent-gateway/Dockerfile .

    - name: Push image
      run: |
        docker push $IMAGE_NAME:latest
        docker push $IMAGE_NAME:${{ steps.meta.outputs.tag }}
