name: agent-gateway-gitops

on:
  push:
    branches: [ main ]

env:
  IMAGE: ghcr.io/igordems/agent-gateway

jobs:
  build-and-update:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set tag
      run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.GHCR_USERNAME }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build image
      run: |
        docker build \
          -t $IMAGE:$TAG \
          -f docker/agent-gateway/Dockerfile .

    - name: Push image
      run: |
        docker push $IMAGE:$TAG

    - name: Install kustomize
      run: |
        curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
        mv kustomize /usr/local/bin/

    - name: Update image tag in kustomization
      run: |
        cd kubernetes/overlays/lab
        kustomize edit set image $IMAGE=$IMAGE:$TAG

    - name: Commit & push
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add kubernetes/overlays/lab/kustomization.yaml
        git commit -m "update agent-gateway image to $TAG" || echo "no changes"

        git push
