apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudmart-tls
  namespace: cloudmart
spec:
  secretName: cloudmart-tls-secret
  issuerRef:
    name: cloudmart-selfsigned
    kind: ClusterIssuer
  commonName: agent.cloudmart.lab
  dnsNames:
    - agent.cloudmart.lab
    - grafana.cloudmart.lab
    - localstack.cloudmart.lab
