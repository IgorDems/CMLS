apiVersion: v1
kind: ConfigMap
metadata:
  name: seed-products-script
  namespace: cloudmart

data:
  seed_products.py: |
    import boto3
    import os

    ddb = boto3.resource(
        "dynamodb",
        region_name=os.getenv("AWS_REGION"),
        endpoint_url=os.getenv("LOCALSTACK_ENDPOINT"),
        aws_access_key_id="test",
        aws_secret_access_key="test",
    )

    table = ddb.Table(os.getenv("PRODUCTS_TABLE"))

    products = [
        {"product_id": "p1", "name": "Laptop", "price": 1200},
        {"product_id": "p2", "name": "Phone", "price": 800},
        {"product_id": "p3", "name": "Headphones", "price": 150},
        {"product_id": "p4", "name": "Monitor", "price": 300},
    ]

    for p in products:
        table.put_item(Item=p)

    print("Seed complete")
