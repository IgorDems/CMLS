apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-gateway
  namespace: cloudmart
spec:
  ingressClassName: nginx
  rules:
  - host: agent.cloudmart.lab
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-gateway
            port:
              number: 80
