apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  namespace: cloudmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-gateway
  template:
    metadata:
      labels:
        app: agent-gateway
    spec:
      imagePullSecrets:
      - name: ghcr-creds
      containers:
      - name: agent-gateway
        image: ghcr.io/igordems/agent-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: agent-gateway-env

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
