apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  namespace: cloudmart
  labels:
    app: agent-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-gateway
  template:
    metadata:
      labels:
        app: agent-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: agent-gateway
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000

          # ✅ всі env беруться з ConfigMap
          envFrom:
            - configMapRef:
                name: agent-gateway-env

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true

          command: ["/bin/sh","-lc"]
          args:
            - |
              pip install --no-cache-dir fastapi uvicorn boto3 prometheus_client httpx && \
              uvicorn app:app --app-dir /app --host 0.0.0.0 --port 8000

          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

      volumes:
        - name: app-code
          configMap:
            name: agent-gateway-app
---
apiVersion: v1
kind: Service
metadata:
  name: agent-gateway
  namespace: cloudmart
  labels:
    app: agent-gateway
spec:
  selector:
    app: agent-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
